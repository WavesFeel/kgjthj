// ---------- RANDOM ----------

function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

shuffle(questions);
questions.forEach(q => shuffle(q.answers));

let current = 0;
let score = 0;
let answered = false;

const form = document.getElementById("quizForm");
const nextBtn = document.getElementById("nextBtn");
const progress = document.getElementById("progress");

function renderQuestion(){

    answered = false;
    nextBtn.textContent = "Ответить";

    const q = questions[current];

    progress.innerHTML = `Вопрос ${current + 1} из ${questions.length}`;

    form.innerHTML = "";

    const div = document.createElement("div");
    div.className = "question";

    let answersHTML = "";

    q.answers.forEach(answer => {
        answersHTML += `
        <label class="answer">
            <input type="radio" name="answer" value="${answer}">
            ${answer}
        </label>
        `;
    });

    div.innerHTML = `
        <h2>${q.question}</h2>
        <div class="answers">${answersHTML}</div>
    `;

    form.appendChild(div);

    document.querySelectorAll("input[name='answer']").forEach(input => {
        input.addEventListener("change", checkAnswer);
    });
}

function checkAnswer(){

    if(answered) return;

    answered = true;

    const q = questions[current];
    const selected = document.querySelector("input[name='answer']:checked");

    const labels = document.querySelectorAll(".answer");

    labels.forEach(label => {

        const input = label.querySelector("input");

        if(input.value === q.correct){
            label.style.background = "#1f6f3b"; // зелёный
        }

        if(input.checked && input.value !== q.correct){
            label.style.background = "#7a1f1f"; // красный
        }
    });

    if(selected.value === q.correct){
        score++;
    }

    nextBtn.textContent = "Дальше";
}

nextBtn.addEventListener("click", () => {

    if(!answered) return;

    current++;

    if(current >= questions.length){

        form.style.display = "none";
        nextBtn.style.display = "none";
        progress.style.display = "none";

        document.getElementById("result").innerHTML =
        `Ваш результат:<br><br>${score} / ${questions.length}`;

    } else {
        renderQuestion();
    }
});

renderQuestion();
